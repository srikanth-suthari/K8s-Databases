apiVersion: v1
kind: Service
metadata:
  name: mongodb-hl
spec:
  ClusterIP: None
  selector:
    name: mongodb
    env: db
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-hl
spec:
  selector:
    name: mongodb
    env: db
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: roboshop
serviceName: mongodb-hl
spec:
  replicas: 1
  selector:
    matchLabels:
      name: mongodb
      env: db