apiVersion: v1
kind: Service
metadata:
  name: mongodb-hl
spec:
  ClusterIP: None
  selector:
    name: mongodb
    project: roboshop
    tier: db
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-hl
spec:
  selector:
    name: mongodb
    project: roboshop
    tier: db
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: roboshop
serviceName: mongodb-hl
spec:
  serviceName: mongodb-hl
  replicas: 1
  selector:
    matchLabels:
      name: mongodb
      project: roboshop
      tier: db
  template:
    metadata:
      name: mongodb
      labels:
        name: mongodb
        project: roboshop
        tier: db
    spec:
      containers:
        - name: mongodb
          image: srikanthsuthari/mongodb:v2