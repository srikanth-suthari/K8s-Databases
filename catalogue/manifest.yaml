
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    component: catalogue
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: catalogue
      tier: backend
  template:
    metadata:
      name: catalogue
      labels:
        project: roboshop
        component: catalogue
        tier: backend
    spec:
      containers:
        - name: catalogue
          image: srikanthsuthari/catalogue:v2
          imagePullPolicy: Always
---