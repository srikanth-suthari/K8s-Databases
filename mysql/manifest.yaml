# HeadLess Service
apiVersion: v1
kind: Service
metadata:
  name: mysql-hl
spec:
  selector:
    project: roboshoop
    env: dev
    tier: db
  ClusterIP: None
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selectors:
    project: roboshoop
    env: dev
    tier: db
  ports:
    - protocol: TCP
      port: 3306
      targetPort:  3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  labels:
    project: roboshoop
    env: dev
    tier: db
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshoop
      env: dev
      tier: db
  template:
    metadata:
      name: mysql
      labels:
        project: roboshoop
        env: dev
        tier: db
    spec:
      containers:
        - name: mysql
          image: srikanthsuthari/mysql:v2
