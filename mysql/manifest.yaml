# HeadLess Service
apiVersion: v1
kind: Service
metadata:
  name: mysql-hl
  namespace: roboshop
spec:
  selector:
    project: roboshoop
    component: mysql
    tier: db
  clusterIP: None
  ports:
    - protocol: TCP
      port: 3306    # Service Port
      targetPort: 3306      # Container Port
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
spec:
  selectors:
    project: roboshoop
    component: mysql
    tier: db
  ports:
    - protocol: TCP
      port: 3306
      targetPort:  3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  labels:
    project: roboshoop
    env: dev
    tier: db
spec:
  serviceName: mysql-hl
  replicas: 1
  selector:
    matchLabels:
      project: roboshoop
      component: mysql
      tier: db
  template:
    metadata:
      name: mysql
      labels:
        project: roboshoop
        component: mysql
        tier: db
    spec:
      containers:
        - name: mysql
          image: srikanthsuthari/mysql:v2
