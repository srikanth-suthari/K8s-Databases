apiVersion: v1
kind: Service
metadata:
  name: redis-hl
  namespace: roboshop
spec:
  clusterIP: None
  selector:
    component: redis
    project: roboshop
    tier: db
  ports:
    - protocol: TCP
      port: 6379    # Service Port
      targetPort: 6379  # Container Port
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
spec:
  selector:
    component: redis
    project: roboshop
    tier: db
  ports:
    - protocol: TCP
      port: 6379    # Service Port
      targetPort: 6379  # container Port
---
